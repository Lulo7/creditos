<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/fontawesome-free-5.15.4-web/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Mi crédito - DRAKO</title>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="index.html">
            <img src="assets/logo.png" width="30" height="30" class="d-inline-block align-top rounded-circle" alt=""> DRAKO
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item" id="navMiPerfil" style="display:none;">
                    <a class="nav-link" href="perfil.html">Mi Perfil</a>
                </li>
            </ul>
            <div class="navbar-nav" id="navButtons">
                <a class="btn btn-outline-warning mr-2 mb-2 mb-lg-0" href="login.html">Iniciar Sesión</a>
                <a class="btn btn-warning" href="registro.html">Registrarse</a>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-fill">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="sinCredito" class="text-center text-white py-5">
                    <i class="fas fa-credit-card fa-5x mb-4"></i>
                    <h3>No tienes ningún crédito solicitado</h3>
                    <p class="lead">Solicita tu crédito ahora y te ayudaremos a alcanzar tus metas.</p>
                    <button class="btn btn-warning btn-lg" onclick="solicitarCredito()">Solicitar crédito</button>
                </div>

                <div id="conCredito" style="display:none;">
                    <div class="card p-4 shadow">
                        <h3 class="text-center mb-4">Mi crédito</h3>
                        <div class="row mb-4">
                            <div class="col-sm-6 mb-3">
                                <div class="bg-warning text-dark p-3 rounded text-center h-100">
                                    <small>Total a pagar</small>
                                    <h4 class="mb-0 font-weight-bold" id="miTotalPagar">$0</h4>
                                </div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <div class="bg-warning text-dark p-3 rounded text-center h-100">
                                    <small>Valor por cuota</small>
                                    <h4 class="mb-0 font-weight-bold" id="miValorCuota">$0</h4>
                                </div>
                            </div>
                        </div>
                        <div class="bg-dark text-white p-3 rounded mb-4" id="miDesembolsoInfo"></div>
                        <h5>Plan de pagos</h5>
                        <div class="table-responsive">
                            <table class="table table-dark table-striped">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Fecha</th>
                                        <th>Valor cuota</th>
                                    </tr>
                                </thead>
                                <tbody id="miPlanPagos"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 flex-shrink-0">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-left mb-3 mb-md-0">
                    <p class="mb-0">&copy; 2026 DRAKO. Todos los derechos reservados.</p>
                </div>
                <div class="col-md-6 text-center text-md-right">
                    <a href="#" class="text-white mr-3"><img src="assets/insta.png" alt="Instagram" class="footer-icon"></a>
                    <a href="#" class="text-white mr-3"><i class="fab fa-facebook fa-2x"></i></a>
                    <a href="#" class="text-white"><i class="fab fa-whatsapp fa-2x"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="./js/index.js"></script>
    <script>
        var solicitud = JSON.parse(localStorage.getItem("solicitudActual"))
        if(solicitud){
            document.getElementById("sinCredito").style.display = "none"
            document.getElementById("conCredito").style.display = "block"

            document.getElementById("miTotalPagar").textContent = "$" + solicitud.totalPagar.toLocaleString("es-CO", { minimumFractionDigits: 2, maximumFractionDigits: 2 })
            document.getElementById("miValorCuota").textContent = "$" + solicitud.valorCuota.toLocaleString("es-CO", { minimumFractionDigits: 2, maximumFractionDigits: 2 })

            var usuario = JSON.parse(localStorage.getItem("usuarioLogeado"))
            if(solicitud.metodo == "efectivo"){
                document.getElementById("miDesembolsoInfo").innerHTML = "<strong>Método de desembolso:</strong> Efectivo<br><strong>Dirección de entrega:</strong> " + (usuario ? usuario.direccion : "—")
            } else {
                document.getElementById("miDesembolsoInfo").innerHTML = "<strong>Método de desembolso:</strong> Transferencia<br><strong>Número de cuenta/teléfono:</strong> " + solicitud.cuentaTransferencia
            }

            var tbody = document.getElementById("miPlanPagos")
            solicitud.planPagos.forEach(function(item){
                var fila = "<tr><td>" + item.cuota + "</td><td>" + item.fecha + "</td><td>$" + item.valor.toLocaleString("es-CO", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + "</td></tr>"
                tbody.innerHTML += fila
            })
        }
        actualizarNavbar()
    </script>
</body>
</html>
