<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/fontawesome-free-5.15.4-web/css/all.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>DRAKO - Solicitar crédito</title>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="index.html">
            <img src="assets/logo.png" width="30" height="30" class="d-inline-block align-top rounded-circle" alt=""> DRAKO
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Inicio</a>
                </li>
                <li class="nav-item" id="navMiPerfil" style="display:none;">
                    <a class="nav-link" href="perfil.html">Mi Perfil</a>
                </li>
            </ul>
            <div class="navbar-nav" id="navButtons">
                <a class="btn btn-outline-warning mr-2 mb-2 mb-lg-0" href="login.html">Iniciar Sesión</a>
                <a class="btn btn-warning" href="registro.html">Registrarse</a>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-fill">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4 shadow">
                    <h3 class="text-center mb-4">Solicitud de crédito</h3>
                    <div class="form-group">
                        <label>Valor del crédito ($)</label>
                        <input type="number" class="form-control" id="valorCredito" min="1" placeholder="Ej: 5000000">
                    </div>
                    <div class="form-group">
                        <label>Número de cuotas (1 - 60)</label>
                        <input type="number" class="form-control" id="numCuotas" min="1" max="60" placeholder="Ej: 12">
                    </div>
                    <div class="form-group">
                        <label>Día de pago</label>
                        <select class="form-control" id="diaPago">
                            <option value="">Selecciona un día</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Método de desembolso</label>
                        <div class="d-flex flex-wrap">
                            <div class="custom-control custom-radio mr-4">
                                <input type="radio" class="custom-control-input" id="efectivo" name="metodoDesembolso" value="efectivo" onchange="toggleDesembolso()">
                                <label class="custom-control-label" for="efectivo">Efectivo</label>
                            </div>
                            <div class="custom-control custom-radio">
                                <input type="radio" class="custom-control-input" id="transferencia" name="metodoDesembolso" value="transferencia" onchange="toggleDesembolso()">
                                <label class="custom-control-label" for="transferencia">Transferencia</label>
                            </div>
                        </div>
                    </div>
                    <div id="campoTransferencia" class="form-group" style="display:none;">
                        <label>Número de cuenta o teléfono</label>
                        <input type="text" class="form-control" id="cuentaTransferencia" placeholder="Ej: 1234567890">
                    </div>
                    <button class="btn btn-warning btn-block btn-lg" onclick="calcularCredito()">Calcular crédito</button>
                </div>

                <div id="resultados" class="mt-4" style="display:none;">
                    <div class="card p-4 shadow">
                        <h4 class="text-center mb-4">Resultados del crédito</h4>
                        <div class="row mb-4">
                            <div class="col-sm-6 mb-3">
                                <div class="bg-warning text-dark p-3 rounded text-center h-100">
                                    <small>Total a pagar</small>
                                    <h4 class="mb-0 font-weight-bold" id="totalPagar">$0</h4>
                                </div>
                            </div>
                            <div class="col-sm-6 mb-3">
                                <div class="bg-warning text-dark p-3 rounded text-center h-100">
                                    <small>Fecha primer pago</small>
                                    <h4 class="mb-0 font-weight-bold" id="fechaPrimerPago">—</h4>
                                </div>
                            </div>
                        </div>
                        <div class="bg-dark text-white p-3 rounded mb-4" id="desembolsoInfo"></div>
                        <h5>Plan de pagos</h5>
                        <div class="table-responsive">
                            <table class="table table-dark table-striped">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Fecha</th>
                                        <th>Valor cuota</th>
                                    </tr>
                                </thead>
                                <tbody id="planPagos"></tbody>
                            </table>
                        </div>
                        <button class="btn btn-success btn-block mt-3" onclick="enviarSolicitud()">Enviar solicitud</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 flex-shrink-0">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-left mb-3 mb-md-0">
                    <p class="mb-0">&copy; 2026 DRAKO. Todos los derechos reservados.</p>
                </div>
                <div class="col-md-6 text-center text-md-right">
                    <a href="#" class="text-white mr-3"><img src="assets/insta.png" alt="Instagram" class="footer-icon"></a>
                    <a href="#" class="text-white mr-3"><i class="fab fa-facebook fa-2x"></i></a>
                    <a href="#" class="text-white"><i class="fab fa-whatsapp fa-2x"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="./js/index.js"></script>
    <script>
        var dias = document.getElementById("diaPago")
        for(var i = 1; i <= 15; i++){
            var opcion = document.createElement("option")
            opcion.value = i
            opcion.textContent = i
            dias.appendChild(opcion)
        }
        actualizarNavbar()
    </script>
</body>
</html>
